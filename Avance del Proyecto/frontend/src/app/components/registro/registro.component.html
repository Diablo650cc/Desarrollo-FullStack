<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-body p-5">
          <h1 class="card-title text-center mb-4">Crear Cuenta</h1>

          <div *ngIf="error" class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ error }}
            <button type="button" class="btn-close" (click)="error = ''"></button>
          </div>

          <div *ngIf="success" class="alert alert-success alert-dismissible fade show" role="alert">
            {{ success }}
          </div>

          <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="mb-3">
              <label for="nombre" class="form-label">Nombre Completo</label>
              <input
                type="text"
                class="form-control"
                id="nombre"
                formControlName="nombre"
                placeholder="Tu nombre completo">
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                id="email"
                formControlName="email"
                placeholder="correo@ejemplo.com">
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <input
                type="password"
                class="form-control"
                id="password"
                formControlName="password"
                placeholder="Mínimo 6 caracteres">
            </div>

            <div class="mb-3">
              <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
              <input
                type="password"
                class="form-control"
                id="confirmPassword"
                formControlName="confirmPassword"
                placeholder="Repite tu contraseña">
              <div *ngIf="form.get('confirmPassword')?.errors?.['passwordMismatch'] && form.get('confirmPassword')?.touched" 
                   class="form-text text-danger">
                Las contraseñas no coinciden
              </div>
            </div>

            <button
              type="submit"
              class="btn btn-success w-100 mb-3"
              [disabled]="form.invalid || loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              {{ loading ? 'Registrando...' : 'Registrarse' }}
            </button>
          </form>

          <hr>

          <p class="text-center mb-0">
            ¿Ya tienes cuenta?
            <a routerLink="/login" class="text-decoration-none">Inicia sesión aquí</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
